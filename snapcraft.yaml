name: notion-desktop
base: core22
version: '1.3.0'
summary: Unofficial Notion Desktop Client
description: |
  A simple and efficient desktop client for Notion, using Electron to provide a seamless experience.

grade: stable
confinement: strict

apps:
  notion-desktop:
    command: notion-desktop
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  notion-desktop:
    plugin: dump
    source: .
    stage-packages:
      - libnss3
      - libxss1
      - libgtk-3-0
